---
galaxy_info:
  author: Jared Cook
  description: "Automated package management for multiple distributions"
  # company: "Optional Company Name"

  license: "AGPL-3.0-or-later"

  min_ansible_version: ">=2.10"
  role_name: pkg_manager

  platforms:
    - name: EL
      versions:
        - "8"
        - "9"
    - name: Debian
      versions:
        - all
    - name: Ubuntu
      versions:
        - all

  galaxy_tags:
    - homelab
    - desktop
    - server
    - apps

dependencies: []

collections:
  - jcook3701.utils
